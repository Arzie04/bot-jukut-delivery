name: Railway Scheduler

on:
  schedule:
    # Mati jam 22:00 WIB (15:00 UTC)
    - cron: '0 15 * * *'

    # Nyala jam 09:00 WIB (02:00 UTC)
    - cron: '0 2 * * *'

  workflow_dispatch:

jobs:
  manage:
    runs-on: ubuntu-latest

    steps:
      - name: Determine action
        id: action
        run: |
          HOUR=$(date -u +%H)

          if [ "$HOUR" = "15" ]; then
            echo "replicas=0" >> $GITHUB_OUTPUT
          else
            echo "replicas=1" >> $GITHUB_OUTPUT
          fi

      - name: Scale Railway Service
        run: |
          curl -X POST \
            https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query":"mutation { serviceInstanceUpdate(input: { projectId: \"${{ secrets.RAILWAY_PROJECT_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\", numReplicas: '${{ steps.action.outputs.replicas }}' }) { id } }"
            }'